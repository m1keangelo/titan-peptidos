version: '3.8'

services:
  titan-peptidos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: titan-peptidos
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - titan-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  titan-network:
    driver: bridge
